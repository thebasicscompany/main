name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Runtime API
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_REGION: us-east-1
      EVENTBRIDGE_API_DESTINATION_ARN: arn:aws:events:us-east-1:635649352555:api-destination/runtime-cron-runnow-production/fed1a05e-d5f8-4c94-8563-10550f4a651d
      EVENTBRIDGE_TARGET_ROLE_ARN: arn:aws:iam::635649352555:role/runtime-cron-invoker-production
      SUPABASE_MIGRATION_URL: ${{ secrets.SUPABASE_MIGRATION_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build API workspace dependencies
        run: |
          pnpm --filter @basics/shared build
          pnpm --filter @basics/harness build

      - name: Typecheck API
        run: pnpm --filter @basics/api typecheck

      - name: Run compatibility tests
        run: pnpm --filter @basics/api test src/routes/assistant-compat.test.ts src/routes/cloud-chat.test.ts

      - name: Apply database migrations
        run: pnpm --filter @basics/api db:migrate

      - name: Disable SST Docker cache export
        run: |
          pnpm exec sst install --stage production
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const root = '.sst/platform'
          const pattern =
            /cacheTo:\s*\[\s*\{\s*registry:\s*\{[\s\S]*?mode:\s*"max",?\s*\},\s*\},\s*\],/g
          let patchedFiles = 0

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(full)
                continue
              }
              if (!entry.isFile()) continue
              if (!full.endsWith('.ts') && !full.endsWith('.mjs')) continue
              let text = fs.readFileSync(full, 'utf8')
              const patched = text.replace(pattern, 'cacheTo: [],')
              if (patched !== text) {
                fs.writeFileSync(full, patched)
                patchedFiles += 1
              }
            }
          }

          walk(root)
          if (patchedFiles === 0) {
            throw new Error('Could not patch any SST Docker cache exports')
          }
          console.log(`Patched SST Docker cache export in ${patchedFiles} files`)
          NODE

      - name: Clear stale SST lock
        run: pnpm sst unlock --stage production || true

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push basics-worker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          REPO="$ECR_REGISTRY/basics-worker"
          docker build \
            --file worker/Dockerfile \
            --tag "$REPO:$IMAGE_TAG" \
            --tag "$REPO:latest" \
            .
          docker push "$REPO:$IMAGE_TAG"
          docker push "$REPO:latest"

      - name: Deploy SST production
        env:
          WORKER_IMAGE_TAG: ${{ github.sha }}
        run: pnpm sst deploy --stage production
